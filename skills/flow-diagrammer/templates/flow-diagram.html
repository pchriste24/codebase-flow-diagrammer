<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebase Flow Diagram</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css" />
  <style>
    :root {
      --c-endpoint: #3b82f6;
      --c-logic: #22c55e;
      --c-database: #f97316;
      --c-external: #a855f7;
      --c-decision: #eab308;

      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 300px; flex: 0 0 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 22px 20px;
      overflow-y: auto;
    }
    .sidebar .title { font-size: 18px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; }
    .sidebar .subtitle { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 20px; }

    .toc { margin-bottom: 22px; }
    .toc a {
      display: block; padding: 7px 10px; border-radius: 8px; font-size: 13px;
      color: var(--text); font-weight: 500;
    }
    .toc a:hover { background: var(--bg); text-decoration: none; }

    .side-section h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin: 18px 0 8px;
    }
    .side-section ul { list-style: none; padding: 0; margin: 0; }
    .side-section li { font-size: 13px; padding: 5px 0; line-height: 1.4; }
    .link-btn {
      background: none; border: none; padding: 0; margin: 0; text-align: left;
      color: var(--accent); font: inherit; cursor: pointer;
    }
    .link-btn:hover { text-decoration: underline; }
    .pill {
      display: inline-block; background: var(--bg); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 10px; font-size: 12px; margin: 3px 4px 0 0;
    }

    /* ---------- Main ---------- */
    .main { flex: 1 1 auto; display: flex; flex-direction: column; overflow-y: auto; }

    .diagram-wrap {
      position: relative;
      height: 62vh; min-height: 360px;
      flex: 0 0 auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .export-btn {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: var(--accent); color: #fff; border: none; padding: 8px 14px;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      box-shadow: 0 2px 8px rgba(15,23,42,0.18);
    }
    .export-btn:hover { background: #1d4ed8; }

    .breadcrumbs {
      position: absolute; top: 12px; left: 14px; z-index: 10;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 13px; max-width: calc(100% - 160px);
    }
    .crumb {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 4px 9px; cursor: pointer; color: var(--text);
      font: inherit; box-shadow: 0 1px 4px rgba(15,23,42,0.1);
    }
    .crumb:hover { background: var(--bg); }
    .crumb.current { font-weight: 700; cursor: default; }
    .crumb-sep { color: var(--muted); }

    .docs { padding: 28px 36px 80px; max-width: 900px; }
    .docs section { margin-bottom: 34px; scroll-margin-top: 16px; }
    .docs h2 {
      font-size: 16px; margin: 0 0 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-left-width: 4px; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    }
    .card .card-head { display: flex; align-items: center; gap: 8px; }
    .card .icon { font-size: 15px; }
    .card .name { font-weight: 600; font-size: 14px; }
    .card .ref { margin-left: auto; font-size: 12px; }
    .card .body { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 6px; }
    .branch { font-size: 13px; padding: 4px 0; }
    .branch .when { font-weight: 600; }

    /* ---------- React Flow nodes ---------- */
    .node {
      position: relative; min-width: 168px; max-width: 220px;
      background: var(--surface); border: 2px solid #94a3b8;
      border-radius: 10px; padding: 9px 12px; text-align: center;
      box-shadow: 0 1px 6px rgba(15,23,42,0.12); cursor: default;
    }
    .node.endpoint { border-radius: 999px; }       /* pill / rounded */
    .node.logic { border-radius: 8px; }
    .node.database { border-radius: 8px; }
    .node.external-service { border-radius: 8px; }
    /* algorithm / control-flow node shapes */
    .node.start, .node.terminal, .node.return, .node.end { border-radius: 999px; }
    .node.loop { border-radius: 8px; border-style: dashed; }
    .node.input, .node.output { border-radius: 8px; }
    .node.clickable { cursor: pointer; }
    .node.clickable:hover { box-shadow: 0 4px 14px rgba(15,23,42,0.2); transform: translateY(-1px); }
    /* drillable node: has a nested sub-diagram */
    .node.has-detail { border-style: double; border-width: 4px; }
    .node .drill-badge {
      position: absolute; top: -9px; right: -9px; z-index: 2;
      background: var(--accent); color: #fff; border-radius: 999px;
      font-size: 11px; line-height: 1; padding: 4px 7px;
      box-shadow: 0 2px 6px rgba(15,23,42,0.3);
    }
    .node-file.as-button {
      background: none; border: none; padding: 0; font: inherit; cursor: pointer;
    }
    .node-file.as-button:hover { text-decoration: underline; }
    .drill-hint { font-size: 10px; color: var(--accent); margin-top: 3px; }
    .node-head { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .node-icon { font-size: 13px; }
    .node-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      color: #fff; padding: 1px 7px; border-radius: 999px;
    }
    .node-label { font-size: 13px; font-weight: 600; line-height: 1.25; margin-top: 5px; }
    .node-file { font-size: 11px; color: var(--accent); margin-top: 4px; word-break: break-all; }

    /* Decision diamond */
    .node.decision {
      width: 150px; height: 150px; min-width: 0; max-width: none;
      background: transparent; border: none; box-shadow: none;
      display: flex; align-items: center; justify-content: center;
    }
    .diamond-bg {
      position: absolute; inset: 16px; transform: rotate(45deg);
      border: 2px solid var(--c-decision); background: var(--surface);
      border-radius: 10px; box-shadow: 0 1px 6px rgba(15,23,42,0.12);
    }
    .node.decision.clickable:hover .diamond-bg { box-shadow: 0 4px 14px rgba(15,23,42,0.2); }
    .node.decision .node-content { position: relative; z-index: 1; padding: 0 8px; }

    .tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: #0f172a; color: #f8fafc; padding: 9px 11px; border-radius: 8px;
      font-size: 12px; line-height: 1.45; width: 230px; z-index: 50;
      box-shadow: 0 8px 22px rgba(15,23,42,0.35); pointer-events: none; text-align: left;
    }
    .tooltip .t-ref { color: #93c5fd; display: block; margin-bottom: 4px; word-break: break-all; }

    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      background: #0f172a; color: #f8fafc; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; z-index: 1000; box-shadow: 0 6px 22px rgba(15,23,42,0.4);
      max-width: 460px; line-height: 1.45;
    }
    .toast a { color: #93c5fd; }

    /* ---------- Responsive ---------- */
    @media (max-width: 820px) {
      .app { flex-direction: column; height: auto; overflow: visible; }
      .sidebar { width: 100%; flex-basis: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .main { overflow-y: visible; }
      .diagram-wrap { height: 70vh; }
      .docs { padding: 22px 18px 60px; }
    }
  </style>

  <!--
    FLOW DATA — replace the JSON below with the traced flow.

    Works in two modes (set diagramType; default "process"):
      "process"   — a flow that spans multiple services (the original use case)
      "algorithm" — a single service's algorithm / decision tree / control flow

    Schema:
      processName   : string                 (title)
      description   : string
      projectRoot   : string   (ABSOLUTE path of the project. Required for clickable
                                code links: node file paths are relative to it, and
                                VS Code's vscode://file/ handler needs absolute paths.
                                The skill fills this with the user's working directory.)
      diagramType   : "process" | "algorithm"   (default "process")
      direction     : "TB" | "LR"            (layout direction; default "TB".
                                              LR reads better for wide decision trees)
      nodes[]       : { id, label, type, file, line, description, subDiagram }
                      type one of:
                        process : endpoint | logic | database | external-service | decision
                        algorithm: start | terminal | return | end | logic | decision |
                                   loop | input | output
                      (positions are auto-computed via dagre — no need to supply x/y)
                      subDiagram : optional key into subDiagrams below. Marks the node
                                   as drillable: clicking the node body zooms into that
                                   nested diagram (clicking its file:line still opens code).
      edges[]       : { id, from, to, label, loopBack }
                      label e.g. "valid"/"invalid"/"true"/"false"/case values.
                      loopBack:true marks a loop-back / repeat edge (drawn dashed + cyan).
      decisions[]   : { id, label, file, line, branches:[{ when, then }] }

      Sidebar / docs sections render only when their data is present, so include
      whichever fit the diagram:
      entryPoints[]      : { label, file, line }  ("POST /x (file:line)" string also works)
      inputs[]           : { name, type, description } | string   (algorithm params)
      preconditions[]    : string                 (guards/assumptions)
      outputs[]          : { name, type, description } | string   (return values)
      externalServices[] : string
      complexity         : string | { time, space }   (e.g. "O(n log n)")

      subDiagrams   : { "<key>": <full flow-data object> }
                      A flat registry of nested diagrams. A process node whose
                      core logic is a non-trivial algorithm points at one of these
                      via its `subDiagram` key. Each value is itself a complete
                      flow-data object (own diagramType/direction/nodes/edges/…),
                      so sub-diagrams can be process or algorithm and can nest
                      further (a sub-diagram's node may reference another key here).
  -->
  <script id="flow-data" type="application/json">
  {

            "branches": [{ "when": "no", "then": "push 'weak password'" }, { "when": "yes", "then": "done" }] }
        ],
        "nodes": [
          { "id": "v1", "label": "start", "type": "start" },
          { "id": "v2", "label": "email matches regex?", "type": "decision", "file": "src/services/validate.js", "line": 8, "description": "RFC-lite email check." },
          { "id": "v3", "label": "push 'invalid email'", "type": "logic", "file": "src/services/validate.js", "line": 9, "description": "Records an email error." },
          { "id": "v4", "label": "password length >= 8?", "type": "decision", "file": "src/services/validate.js", "line": 14, "description": "Minimum length guard." },
          { "id": "v5", "label": "push 'weak password'", "type": "logic", "file": "src/services/validate.js", "line": 15, "description": "Records a password error." },
          { "id": "v6", "label": "return errors", "type": "return", "file": "src/services/validate.js", "line": 18, "description": "Empty array means valid." }
        ],
        "edges": [
          { "from": "v1", "to": "v2" },
          { "from": "v2", "to": "v3", "label": "no" },
          { "from": "v2", "to": "v4", "label": "yes" },
          { "from": "v3", "to": "v4" },
          { "from": "v4", "to": "v5", "label": "no" },
          { "from": "v4", "to": "v6", "label": "yes" },
          { "from": "v5", "to": "v6" }
        ]
      }
    }
  }
  </script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12?external=react,react-dom",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState } from "react";
    import { createRoot } from "react-dom/client";
    import htm from "htm";
    import {
      ReactFlow, Background, Controls, MiniMap,
      Handle, Position, useNodesState, useEdgesState
    } from "@xyflow/react";
    import { toPng } from "https://esm.sh/html-to-image@1.11.11";
    import dagre from "https://esm.sh/@dagrejs/dagre@1.1.4";

    const html = htm.bind(React.createElement);

    const TYPE_COLORS = {
      endpoint: "#3b82f6",
      logic: "#22c55e",
      database: "#f97316",
      "external-service": "#a855f7",
      decision: "#eab308",
      // algorithm / control-flow
      start: "#14b8a6",
      terminal: "#475569",
      return: "#475569",
      end: "#475569",
      loop: "#06b6d4",
      input: "#ec4899",
      output: "#6366f1",
    };
    const TYPE_ICONS = {
      endpoint: "🌐",
      logic: "⚙️",
      database: "🗄️",
      "external-service": "🔗",
      decision: "❓",
      start: "▶",
      terminal: "⏹",
      return: "↩",
      end: "⏹",
      loop: "🔁",
      input: "📥",
      output: "📤",
    };
    const TYPE_BADGE = { "external-service": "external" };

    const flowData = JSON.parse(document.getElementById("flow-data").textContent);

    // Flat registry of nested sub-diagrams, referenced by a node's `subDiagram` key.
    // Each value is a full flow-data object (its own nodes/edges/diagramType/etc.).
    const SUBDIAGRAMS = flowData.subDiagrams || {};

    // Absolute path of the project the diagram was generated for. The skill fills
    // this with the user's working directory so vscode://file links resolve
    // (node file paths are stored relative to it).
    const PROJECT_ROOT = (flowData.projectRoot || "").replace(/\/+$/, "");

    // Layout direction is per-diagram: TB (top-bottom) default, LR for wide trees.
    function posFor(dir) {
      return dir === "LR"
        ? { target: Position.Left, source: Position.Right }
        : { target: Position.Top, source: Position.Bottom };
    }
    function dirOf(diagram) {
      return (diagram.direction || "TB").toUpperCase() === "LR" ? "LR" : "TB";
    }

    // Normalize an entry point that may be a string "Label (file:line)" or an object.
    function normalizeRef(ref) {
      if (ref && typeof ref === "object") return ref;
      const m = String(ref).match(/^(.*?)\s*\(([^()]+):(\d+)\)\s*$/);
      if (m) return { label: m[1].trim(), file: m[2], line: Number(m[3]) };
      return { label: String(ref) };
    }

    /* ---------- Open a code file in VS Code ----------
       Uses the vscode://file/<absolute-path>:<line>:<col> URL handler. The path
       must be absolute, so relative node paths are resolved against PROJECT_ROOT. */
    function toAbsPath(filePath) {
      if (filePath.startsWith("/")) return filePath;          // already absolute
      const rel = filePath.replace(/^\.?\//, "");
      return PROJECT_ROOT ? PROJECT_ROOT + "/" + rel : null;  // need a root to resolve
    }

    function openCodeFile(filePath, line) {
      if (!filePath) return;
      const abs = toAbsPath(filePath);
      if (!abs) {
        showToast(
          "Can't open <code>" + filePath + "</code> — it's a relative path and no " +
          "<code>projectRoot</code> is set in the diagram data. Set it to your project's " +
          "absolute path so VS Code links resolve."
        );
        return;
      }
      // vscode://file/<path>:<line>:<col> — encode the path, keep the :line:col suffix literal.
      const url = "vscode://file/" + encodeURI(abs) + ":" + (line || 1) + ":1";
      const a = document.createElement("a");
      a.href = url;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
    window.openCodeFile = openCodeFile;

    let toastTimer = null;
    function showToast(htmlMsg) {
      let el = document.querySelector(".toast");
      if (!el) { el = document.createElement("div"); el.className = "toast"; document.body.appendChild(el); }
      el.innerHTML = htmlMsg;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.remove(), 6000);
    }

    /* ---------- Custom node ----------
       Click handling lives at the canvas level (onNodeClick): a node with a
       subDiagram drills in; otherwise it opens its code. The file:line ref is a
       button that stops propagation, so on a drillable node you can still open
       the code without drilling. */
    function FlowNode({ data }) {
      const [hover, setHover] = useState(false);
      const color = TYPE_COLORS[data.type] || "#64748b";
      const icon = TYPE_ICONS[data.type] || "•";
      const isDecision = data.type === "decision";
      const hasDetail = !!data.subDiagram;
      const clickable = !!(data.file || hasDetail);
      const badge = TYPE_BADGE[data.type] || data.type;
      const targetPos = data._targetPos || Position.Top;
      const sourcePos = data._sourcePos || Position.Bottom;

      const tooltip = (hover && (data.description || data.file || hasDetail)) ? html`
        <div class="tooltip">
          ${data.file ? html`<span class="t-ref">${data.file}${data.line ? ":" + data.line : ""}</span>` : null}
          ${data.description || ""}
          ${hasDetail ? html`<div style=${{ marginTop: "5px", color: "#93c5fd" }}>Click to open detail ⤵</div>` : null}
        </div>` : null;

      const fileRef = data.file ? html`
        <button class="node-file as-button"
                onClick=${(e) => { e.stopPropagation(); openCodeFile(data.file, data.line); }}>
          ${data.file}${data.line ? ":" + data.line : ""}
        </button>` : null;

      const content = html`
        <div class="node-content">
          <div class="node-head">
            <span class="node-icon">${icon}</span>
            <span class="node-badge" style=${{ background: color }}>${badge}</span>
          </div>
          <div class="node-label">${data.label}</div>
          ${fileRef}
          ${hasDetail ? html`<div class="drill-hint">▸ open detail</div>` : null}
        </div>`;

      const handlers = {
        onMouseEnter: () => setHover(true),
        onMouseLeave: () => setHover(false),
      };
      const cls = (extra) => "node " + extra
        + (clickable ? " clickable" : "") + (hasDetail ? " has-detail" : "");

      if (isDecision) {
        return html`
          <div class=${cls("decision")} ...${handlers}>
            <div class="diamond-bg"></div>
            ${hasDetail ? html`<span class="drill-badge">⤵</span>` : null}
            <${Handle} type="target" position=${targetPos} />
            ${content}
            <${Handle} type="source" position=${sourcePos} />
            ${tooltip}
          </div>`;
      }

      return html`
        <div class=${cls(data.type)} style=${{ borderColor: color }} ...${handlers}>
          ${hasDetail ? html`<span class="drill-badge">⤵</span>` : null}
          <${Handle} type="target" position=${targetPos} />
          ${content}
          <${Handle} type="source" position=${sourcePos} />
          ${tooltip}
        </div>`;
    }
    const nodeTypes = { flowNode: FlowNode };

    // Node footprints used for layout spacing (must comfortably exceed the
    // rendered node so multi-line labels never overlap).
    const NODE_SIZE = { width: 230, height: 110 };
    const DECISION_SIZE = { width: 170, height: 170 };
    const TERMINAL_SIZE = { width: 200, height: 80 };
    const TERMINAL_TYPES = new Set(["start", "terminal", "return", "end"]);
    const sizeFor = (type) =>
      type === "decision" ? DECISION_SIZE
      : TERMINAL_TYPES.has(type) ? TERMINAL_SIZE
      : NODE_SIZE;

    // Auto-layout with dagre so nodes never overlap and edges stay readable.
    // Honors the diagram's direction (TB/LR) and handles cycles/back-edges
    // (loops) automatically. Overrides any positions in the data.
    function autoLayout(nodes, edges, dir) {
      try {
        const g = new dagre.graphlib.Graph();
        g.setGraph({ rankdir: dir, nodesep: 80, ranksep: 110, marginx: 24, marginy: 24 });
        g.setDefaultEdgeLabel(() => ({}));
        nodes.forEach((n) => {
          const s = sizeFor(n.data.type);
          g.setNode(n.id, { width: s.width, height: s.height });
        });
        edges.forEach((e) => g.setEdge(e.source, e.target));
        dagre.layout(g);
        return nodes.map((n) => {
          const p = g.node(n.id);
          const s = sizeFor(n.data.type);
          return { ...n, position: { x: p.x - s.width / 2, y: p.y - s.height / 2 } };
        });
      } catch (e) {
        // Fallback: simple vertical stack (or any positions supplied in data).
        return nodes.map((n, i) => ({
          ...n, position: n.data.position || { x: 320, y: i * 150 },
        }));
      }
    }

    function normalizeNamed(item) {
      if (item && typeof item === "object")
        return { label: item.name || item.label || "", type: item.type,
                 description: item.description, file: item.file, line: item.line };
      return { label: String(item) };
    }
    function complexityText(c) {
      if (!c) return null;
      if (typeof c === "string") return c;
      const parts = [];
      if (c.time) parts.push("Time " + c.time);
      if (c.space) parts.push("Space " + c.space);
      return parts.join(" · ") || null;
    }

    /* ---------- Build everything derived from one diagram ----------
       Called per active level so drill-down sub-diagrams each get their own
       layout, sidebar, and docs. Sections render only when data is present, so
       the same builder serves process flows and single-service algorithms. */
    function buildDiagram(diagram) {
      const dir = dirOf(diagram);
      const pos = posFor(dir);
      const diagramType = (diagram.diagramType || "process").toLowerCase();

      const rawNodes = (diagram.nodes || []).map((n) => ({
        id: n.id, type: "flowNode",
        position: { x: 0, y: 0 },
        sourcePosition: pos.source, targetPosition: pos.target,
        data: { ...n, _sourcePos: pos.source, _targetPos: pos.target },
      }));
      const edges = (diagram.edges || []).map((e, i) => {
        const loop = !!(e.loopBack || e.kind === "loop");
        return {
          id: e.id || "e" + i,
          source: e.from || e.source,
          target: e.to || e.target,
          label: e.label,
          type: "smoothstep",
          animated: loop,
          labelStyle: { fill: "#0f172a", fontSize: 12, fontWeight: 600 },
          labelBgStyle: { fill: "#ffffff", fillOpacity: 0.95 },
          labelBgPadding: [6, 3],
          labelBgBorderRadius: 6,
          style: loop
            ? { stroke: "#06b6d4", strokeWidth: 2, strokeDasharray: "6 4" }
            : { stroke: "#475569", strokeWidth: 2 },
          markerEnd: { type: "arrowclosed", color: loop ? "#06b6d4" : "#475569", width: 20, height: 20 },
        };
      });
      const nodes = autoLayout(rawNodes, edges, dir);

      const D = {
        entries: (diagram.entryPoints || []).map(normalizeRef),
        inputs: (diagram.inputs || []).map(normalizeNamed),
        preconditions: diagram.preconditions || [],
        steps: (diagram.nodes || []).filter((n) => n.type !== "decision"),
        decisions: diagram.decisions || [],
        outputs: (diagram.outputs || []).map(normalizeNamed),
        externals: diagram.externalServices || [],
        complexity: complexityText(diagram.complexity),
      };
      const stepsTitle = diagramType === "algorithm" ? "Steps" : "Core Flow Steps";
      const sections = [
        D.entries.length && { id: "entry-points", label: "Entry Points" },
        D.inputs.length && { id: "inputs", label: "Inputs / Parameters" },
        D.preconditions.length && { id: "preconditions", label: "Preconditions" },
        D.steps.length && { id: "steps", label: stepsTitle },
        D.decisions.length && { id: "decision-points", label: "Decision Points" },
        D.outputs.length && { id: "outputs", label: "Outputs / Returns" },
        D.externals.length && { id: "external-services", label: "External Services" },
      ].filter(Boolean);

      return {
        diagramType, dir,
        title: diagram.processName || "Flow Diagram",
        description: diagram.description || "",
        nodes, edges, D, stepsTitle, sections,
      };
    }

    function exportPng(name) {
      const target = document.querySelector(".react-flow__viewport");
      const container = document.querySelector(".react-flow");
      if (!target || !container) return;
      toPng(target, {
        backgroundColor: "#ffffff",
        width: container.clientWidth,
        height: container.clientHeight,
        style: { width: container.clientWidth + "px", height: container.clientHeight + "px" },
      }).then((dataUrl) => {
        const a = document.createElement("a");
        a.download = (name || "flow").replace(/\s+/g, "-").toLowerCase() + ".png";
        a.href = dataUrl;
        a.click();
      }).catch(() => showToast("PNG export failed."));
    }

    function refCard(label, file, line, color, icon) {
      return html`
        <div class="card" style=${{ borderLeftColor: color }}>
          <div class="card-head">
            <span class="icon">${icon}</span>
            <span class="name">${label}</span>
            ${file ? html`<span class="ref"><button class="link-btn" onClick=${() => openCodeFile(file, line)}><code>${file}${line ? ":" + line : ""}</code></button></span>` : null}
          </div>
        </div>`;
    }

    /* ---------- Sidebar ---------- */
    function Sidebar({ model }) {
      const { D, sections } = model;
      return html`
        <aside class="sidebar">
          <h1 class="title">${model.title}</h1>
          ${model.diagramType === "algorithm" ? html`<span class="pill">algorithm</span>` : null}
          <div class="subtitle">${model.description}</div>

          <nav class="toc">
            ${sections.map((s) => html`<a href=${"#" + s.id} key=${s.id}>${s.label}</a>`)}
          </nav>

          ${D.entries.length ? html`
            <div class="side-section">
              <h3>Entry Points</h3>
              <ul>${D.entries.map((e, i) => html`
                <li key=${i}>
                  ${e.file
                    ? html`<button class="link-btn" onClick=${() => openCodeFile(e.file, e.line)}>${e.label}</button>
                           <div><code>${e.file}${e.line ? ":" + e.line : ""}</code></div>`
                    : e.label}
                </li>`)}</ul>
            </div>` : null}

          ${D.inputs.length ? html`
            <div class="side-section">
              <h3>Inputs / Parameters</h3>
              <ul>${D.inputs.map((p, i) => html`
                <li key=${i}><strong>${p.label}</strong>${p.type ? html` <code>${p.type}</code>` : null}</li>`)}</ul>
            </div>` : null}

          ${D.externals.length ? html`
            <div class="side-section">
              <h3>External Dependencies</h3>
              <div>${D.externals.map((e, i) => html`<span class="pill" key=${i}>${e}</span>`)}</div>
            </div>` : null}

          ${D.complexity ? html`
            <div class="side-section">
              <h3>Complexity</h3>
              <div><code>${D.complexity}</code></div>
            </div>` : null}
        </aside>`;
    }

    /* ---------- Docs sections below the diagram ---------- */
    function Docs({ model }) {
      const { D, stepsTitle: STEPS_TITLE } = model;
      return html`
        <div class="docs">
          ${D.entries.length ? html`
            <section id="entry-points"><h2>Entry Points</h2>
              ${D.entries.map((e, i) => html`<div key=${i}>${refCard(e.label, e.file, e.line, TYPE_COLORS.endpoint, "🌐")}</div>`)}
            </section>` : null}

          ${D.inputs.length ? html`
            <section id="inputs"><h2>Inputs / Parameters</h2>
              ${D.inputs.map((p, i) => html`
                <div class="card" key=${i} style=${{ borderLeftColor: TYPE_COLORS.input }}>
                  <div class="card-head">
                    <span class="icon">📥</span>
                    <span class="name">${p.label}${p.type ? html` — ${p.type}` : null}</span>
                  </div>
                  ${p.description ? html`<div class="body">${p.description}</div>` : null}
                </div>`)}
            </section>` : null}

          ${D.preconditions.length ? html`
            <section id="preconditions"><h2>Preconditions</h2>
              ${D.preconditions.map((p, i) => html`
                <div class="card" key=${i} style=${{ borderLeftColor: TYPE_COLORS.start }}>
                  <div class="card-head"><span class="icon">✅</span><span class="name">${p}</span></div>
                </div>`)}
            </section>` : null}

          ${D.steps.length ? html`
            <section id="steps"><h2>${STEPS_TITLE}</h2>
              ${D.steps.map((n, i) => html`
                <div class="card" key=${n.id} style=${{ borderLeftColor: TYPE_COLORS[n.type] || "#94a3b8" }}>
                  <div class="card-head">
                    <span class="icon">${TYPE_ICONS[n.type] || "•"}</span>
                    <span class="name">${i + 1}. ${n.label}</span>
                    ${n.file ? html`<span class="ref"><button class="link-btn" onClick=${() => openCodeFile(n.file, n.line)}><code>${n.file}:${n.line}</code></button></span>` : null}
                  </div>
                  ${n.description ? html`<div class="body">${n.description}</div>` : null}
                </div>`)}
            </section>` : null}

          ${D.decisions.length ? html`
            <section id="decision-points"><h2>Decision Points</h2>
              ${D.decisions.map((d, i) => html`
                <div class="card" key=${i} style=${{ borderLeftColor: TYPE_COLORS.decision }}>
                  <div class="card-head">
                    <span class="icon">❓</span>
                    <span class="name">${d.label || d.condition || "Decision"}</span>
                    ${d.file ? html`<span class="ref"><button class="link-btn" onClick=${() => openCodeFile(d.file, d.line)}><code>${d.file}:${d.line}</code></button></span>` : null}
                  </div>
                  ${(d.branches || []).map((b, j) => html`
                    <div class="branch" key=${j}><span class="when">${b.when}:</span> ${b.then}</div>`)}
                </div>`)}
            </section>` : null}

          ${D.outputs.length ? html`
            <section id="outputs"><h2>Outputs / Returns</h2>
              ${D.outputs.map((p, i) => html`
                <div class="card" key=${i} style=${{ borderLeftColor: TYPE_COLORS.output }}>
                  <div class="card-head">
                    <span class="icon">📤</span>
                    <span class="name">${p.label}${p.type ? html` — ${p.type}` : null}</span>
                  </div>
                  ${p.description ? html`<div class="body">${p.description}</div>` : null}
                </div>`)}
            </section>` : null}

          ${D.externals.length ? html`
            <section id="external-services"><h2>External Services</h2>
              ${D.externals.map((e, i) => html`
                <div class="card" key=${i} style=${{ borderLeftColor: TYPE_COLORS["external-service"] }}>
                  <div class="card-head"><span class="icon">🔗</span><span class="name">${e}</span></div>
                </div>`)}
            </section>` : null}
        </div>`;
    }

    /* ---------- App ---------- */
    function Diagram({ model, onNodeClick }) {
      // Remounted (via key) on navigation, so useNodesState re-inits cleanly.
      const [nodes, , onNodesChange] = useNodesState(model.nodes);
      const [edges, , onEdgesChange] = useEdgesState(model.edges);
      return html`
        <${ReactFlow}
          nodes=${nodes}
          edges=${edges}
          nodeTypes=${nodeTypes}
          onNodesChange=${onNodesChange}
          onEdgesChange=${onEdgesChange}
          onNodeClick=${onNodeClick}
          fitView
          fitViewOptions=${{ padding: 0.2 }}
          minZoom=${0.1}
          proOptions=${{ hideAttribution: true }}>
          <${Background} color="#cbd5e1" gap=${20} />
          <${MiniMap} pannable zoomable />
          <${Controls} />
        <//>`;
    }

    function Breadcrumbs({ stack, onJump }) {
      return html`
        <div class="breadcrumbs">
          ${stack.map((c, i) => html`
            <span key=${i} style=${{ display: "flex", alignItems: "center", gap: "6px" }}>
              ${i > 0 ? html`<span class="crumb-sep">›</span>` : null}
              ${i === stack.length - 1
                ? html`<span class="crumb current">${c.title}</span>`
                : html`<button class="crumb" onClick=${() => onJump(i)}>${c.title}</button>`}
            </span>`)}
        </div>`;
    }

    function App() {
      const [stack, setStack] = useState([
        { key: "__root__", title: flowData.processName || "Flow", diagram: flowData },
      ]);
      const active = stack[stack.length - 1];
      const model = React.useMemo(() => buildDiagram(active.diagram), [active]);

      const drill = (key) => {
        const sub = SUBDIAGRAMS[key];
        if (!sub) { showToast("Sub-diagram <code>" + key + "</code> not found."); return; }
        setStack((s) => [...s, { key, title: sub.processName || key, diagram: sub }]);
      };
      const jump = (idx) => setStack((s) => s.slice(0, idx + 1));
      const onNodeClick = (_e, node) => {
        const d = node.data || {};
        if (d.subDiagram) drill(d.subDiagram);
        else if (d.file) openCodeFile(d.file, d.line);
      };

      return html`
        <div class="app">
          <${Sidebar} model=${model} />
          <div class="main">
            <div class="diagram-wrap">
              ${stack.length > 1 ? html`<${Breadcrumbs} stack=${stack} onJump=${jump} />` : null}
              <button class="export-btn" onClick=${() => exportPng(model.title)}>Export to PNG</button>
              <${Diagram} key=${stack.length + ":" + active.key} model=${model} onNodeClick=${onNodeClick} />
            </div>
            <${Docs} model=${model} />
          </div>
        </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
